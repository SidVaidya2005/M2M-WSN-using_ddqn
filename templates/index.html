<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Interface</title>
    <link rel="stylesheet" href="/templates/index.css">
</head>

<body>

    <header class="site-header">
        <h1 class="site-title">🔬Training Dashboard</h1>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-layout">
            <aside class="config-panel" aria-label="Training Configuration">
                <h2 class="panel-title">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                        </path>
                    </svg>
                    Configurations
                </h2>

                <form id="trainingForm">
                    <div class="form-group">
                        <label for="episodes">Episodes</label>
                        <input type="number" id="episodes" class="form-control" value="100" min="1" max="10000">
                    </div>

                    <div class="form-group">
                        <label for="nodes">Number of Nodes</label>
                        <input type="number" id="nodes" class="form-control" value="50" min="10" max="2000">
                    </div>

                    <div class="form-group">
                        <label for="lr">Learning Rate</label>
                        <select id="lr" class="form-control">
                            <option value="0.001">0.001</option>
                            <option value="0.0001" selected>0.0001</option>
                            <option value="0.00001">0.00001</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="gamma">Gamma (Discount Factor)</label>
                        <input type="number" id="gamma" class="form-control" value="0.99" min="0" max="1" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="batch_size">Batch Size</label>
                        <select id="batch_size" class="form-control">
                            <option value="32">32</option>
                            <option value="64" selected>64</option>
                            <option value="128">128</option>
                            <option value="256">256</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="death_threshold">Network Death Threshold (%)</label>
                        <input type="number" id="death_threshold" class="form-control" value="30" min="1" max="100">
                    </div>

                    <div class="form-group">
                        <label for="seed">Random Seed</label>
                        <input type="number" id="seed" class="form-control" value="42" min="0">
                    </div>

                    <button type="submit" id="runBtn" class="btn">
                        <span id="runBtnText">Start Training</span>
                        <div class="loader" id="loader"></div>
                    </button>

                    <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
                </form>
            </aside>

            <section class="results-panel" aria-label="Training Results">
                <h2 class="panel-title">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 19V6l12-3v13M9 19c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zm12-3c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zM9 10l12-3">
                        </path>
                    </svg>
                    Training Results
                </h2>

                <section class="metrics-grid" id="metricsGrid" aria-label="Key Metrics">
                    <div class="metric-card">
                        <div class="metric-title">Best Lifetime</div>
                        <div class="metric-value" id="valBestLifetime">-</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Best Episode</div>
                        <div class="metric-value" id="valBestEpisode">-</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Avg Lifetime (Last 10)</div>
                        <div class="metric-value" id="valAvgLifetime">-</div>
                    </div>
                </section>

                <section class="results-media-stack" aria-label="Generated Visualizations">
                    <div class="training-image">
                        <div class="placeholder-text" id="imagePlaceholder">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z">
                                </path>
                            </svg>
                            Run training to view the generated plots here.
                        </div>
                        <img id="resultImage" src="/results/final_ddqn_training.png" alt="DDQN Training Results">
                    </div>

                    <div class="simulation-gif" id="gifContainer">
                        <img id="resultGif" src="" alt="Best Episode Simulation">
                    </div>
                </section>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        simulation interface
    </footer>

    <script src="/templates/index.js"></script>
</body>

</html>
