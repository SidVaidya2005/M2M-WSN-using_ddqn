<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDQN Training Interface</title>
    <link rel="stylesheet" href="/index.css">
</head>

<body>

    <header class="site-header">
        <h1 class="site-title">🔬 DDQN Training Dashboard</h1>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-layout">
            <aside class="card-panel config-panel" aria-label="Training Configuration">
                <h2 class="panel-title">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                        </path>
                    </svg>
                    Configurations
                </h2>

                <form id="trainingForm">
                    <div class="form-group">
                        <label for="episodes">Episodes</label>
                        <input type="number" id="episodes" class="form-control" value="100" min="1" max="10000">
                    </div>

                    <div class="form-group">
                        <label for="nodes">Number of Nodes</label>
                        <input type="number" id="nodes" class="form-control" value="550" min="10" max="2000">
                    </div>

                    <div class="form-group">
                        <label for="lr">Learning Rate</label>
                        <select id="lr" class="form-control">
                            <option value="0.001">0.001</option>
                            <option value="0.0001" selected>0.0001</option>
                            <option value="0.00001">0.00001</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="gamma">Gamma (Discount Factor)</label>
                        <input type="number" id="gamma" class="form-control" value="0.99" min="0" max="1" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="batch_size">Batch Size</label>
                        <select id="batch_size" class="form-control">
                            <option value="32">32</option>
                            <option value="64" selected>64</option>
                            <option value="128">128</option>
                            <option value="256">256</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="death_threshold">Network Death Threshold (%)</label>
                        <input type="number" id="death_threshold" class="form-control" value="30" min="1" max="100">
                    </div>

                    <div class="form-group">
                        <label for="seed">Random Seed</label>
                        <input type="number" id="seed" class="form-control" value="42" min="0">
                    </div>

                    <button type="submit" id="runBtn" class="btn">
                        <span class="btn-text">Start Training</span>
                        <div class="loader" id="loader"></div>
                    </button>

                    <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
                </form>
            </aside>

            <section class="card-panel results-panel" aria-label="Training Results">
                <h2 class="panel-title">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 19V6l12-3v13M9 19c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zm12-3c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zM9 10l12-3">
                        </path>
                    </svg>
                    Training Results
                </h2>

                <section class="metrics-grid" id="metricsGrid" aria-label="Key Metrics">
                    <div class="metric-card">
                        <div class="metric-title">Best Lifetime</div>
                        <div class="metric-value" id="valBestLifetime">-</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Best Episode</div>
                        <div class="metric-value" id="valBestEpisode">-</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Avg Lifetime (Last 10)</div>
                        <div class="metric-value" id="valAvgLifetime">-</div>
                    </div>
                </section>

                <section class="results-media-stack" aria-label="Generated Visualizations">
                    <div class="image-container training-image-box">
                        <div class="placeholder-text" id="imagePlaceholder">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z">
                                </path>
                            </svg>
                            Run training to view the generated plots here.
                        </div>
                        <img id="resultImage" src="" alt="DDQN Training Results">
                    </div>

                    <div class="image-container simulation-gif-box" id="gifContainer">
                        <img id="resultGif" class="result-gif" src="" alt="Best Episode Simulation">
                    </div>
                </section>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        DDQN simulation interface
    </footer>

    <script>
        const trainingForm = document.getElementById('trainingForm');

        trainingForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const runButton = document.getElementById('runBtn');
            const buttonText = runButton.querySelector('.btn-text');
            const loader = document.getElementById('loader');
            const statusMessage = document.getElementById('statusMessage');
            const resultImage = document.getElementById('resultImage');
            const imagePlaceholder = document.getElementById('imagePlaceholder');
            const metricsGrid = document.getElementById('metricsGrid');
            const gifContainer = document.getElementById('gifContainer');

            const payload = {
                episodes: parseInt(document.getElementById('episodes').value),
                nodes: parseInt(document.getElementById('nodes').value),
                lr: parseFloat(document.getElementById('lr').value),
                gamma: parseFloat(document.getElementById('gamma').value),
                batch_size: parseInt(document.getElementById('batch_size').value),
                death_threshold: parseFloat(document.getElementById('death_threshold').value) / 100.0,
                seed: parseInt(document.getElementById('seed').value)
            };

            runButton.disabled = true;
            buttonText.textContent = 'Training...';
            loader.style.display = 'block';
            statusMessage.style.display = 'none';
            statusMessage.className = 'status-message';
            gifContainer.style.display = 'none';

            try {
                const response = await fetch('/run_training', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    statusMessage.textContent = data.message;
                    statusMessage.classList.add('status-success');
                    statusMessage.style.display = 'block';

                    const timestamp = new Date().getTime();
                    resultImage.src = `${data.image_url}?t=${timestamp}`;

                    resultImage.onload = () => {
                        imagePlaceholder.style.display = 'none';
                        resultImage.style.display = 'block';
                    };

                    if (data.gif_url) {
                        const resultGif = document.getElementById('resultGif');
                        resultGif.src = `${data.gif_url}?t=${timestamp}`;
                        gifContainer.style.display = 'block';
                    }

                    if (data.results) {
                        document.getElementById('valBestLifetime').textContent = data.results.best_lifetime;
                        document.getElementById('valBestEpisode').textContent = data.results.best_episode;
                        document.getElementById('valAvgLifetime').textContent = data.results.avg_lifetime_final_10.toFixed(1);
                        metricsGrid.style.display = 'grid';
                    }
                } else {
                    throw new Error(data.message || 'Unknown server error');
                }
            } catch (err) {
                statusMessage.textContent = `Error: ${err.message}`;
                statusMessage.classList.add('status-error');
                statusMessage.style.display = 'block';
            } finally {
                runButton.disabled = false;
                buttonText.textContent = 'Start Training';
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
