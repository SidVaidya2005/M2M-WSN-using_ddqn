training:
  episodes: 100
  batch_size: 64
  learning_rate: 1.0e-4
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 50000
  target_update_frequency: 500
  replay_buffer_size: 200000
  min_replay_size: 500

environment:
  num_nodes: 50
  arena_size: [500, 500]
  sink_position: [250, 250]
  max_steps: 1000
  timestep_energy_awake: 1.0
  energy_sleep: 0.01
  death_threshold: 0.3
  seed: 42
  sensing_radius: 100.0
  reward_weights:
    coverage: 10.0
    energy: 5.0
    soh: 1.0
    balance: 2.0
  charging:
    enabled: true
    rate: 0.05
    threshold: 0.2
  wake_cooperation:
    low_battery_soc: 0.5

paths:
  models: results/models
  metrics: results/metrics
  visualizations: results/visualizations
  logs: logs

visualization:
  save_plots: true
  plot_dpi: 150
  animation_interval: 100
